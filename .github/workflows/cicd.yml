name: CI/CD Docker Deploy to Azure VM (ACR, Tag Only)

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. Extract tag
    - name: Extract Git tag
      run: |
        TAG=${GITHUB_REF#refs/tags/}
        echo "APP_TAG=$TAG" >> $GITHUB_ENV
        echo "Deploying $TAG"

    # 3. Login ACR
    - name: Login to ACR
      run: |
        echo "${{ secrets.ACR_PASSWORD }}" | docker login \
          ${{ secrets.ACR_LOGIN_SERVER }} \
          -u ${{ secrets.ACR_USERNAME }} \
          --password-stdin

    # 4. Build & Push Backend
    - name: Build & Push Backend
      run: |
        docker build \
          -t ${{ secrets.ACR_LOGIN_SERVER }}/backend:${APP_TAG} \
          ./backend
        docker push \
          ${{ secrets.ACR_LOGIN_SERVER }}/backend:${APP_TAG}

    # 5. Build & Push Frontend
    - name: Build & Push Frontend
      run: |
        docker build \
          -t ${{ secrets.ACR_LOGIN_SERVER }}/frontend:${APP_TAG} \
          ./frontend
        docker push \
          ${{ secrets.ACR_LOGIN_SERVER }}/frontend:${APP_TAG}

    # 6. DEPLOY (INI YANG FIX MASALAH KAMU)
    - name: Deploy to VM
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.VM_HOST }}
        username: ${{ secrets.VM_USER }}
        key: ${{ secrets.VM_SSH_KEY }}
        script: |
          echo "🚀 Deploying version $APP_TAG"

          docker login ${{ secrets.ACR_LOGIN_SERVER }} \
            -u ${{ secrets.ACR_USERNAME }} \
            -p ${{ secrets.ACR_PASSWORD }}

          cd ~/app

          # INI KUNCI UTAMA
          APP_TAG=$APP_TAG docker-compose up -d

          docker ps

apiVersion: apps/v1
kind: Deployment
metadata:
  name: library-backend
  namespace: app
  labels:
    app: library-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: library-backend
  template:
    metadata:
      labels:
        app: library-backend
    spec:
      nodeSelector:
        kubernetes.azure.com/agentpool: apppool

      containers:
        - name: backend
          image: your-registry/library-backend:latest
          imagePullPolicy: IfNotPresent
          
          ports:
            - containerPort: 8000
          
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
          
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

---
apiVersion: v1
kind: Service
metadata:
  name: library-backend
  namespace: app
spec:
  type: ClusterIP
  selector:
    app: library-backend
  ports:
    - name: http
      port: 8000
      targetPort: 8000

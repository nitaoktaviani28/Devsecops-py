apiVersion: apps/v1
kind: Deployment
metadata:
  name: library-frontend
  namespace: app
  labels:
    app: library-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: library-frontend
  template:
    metadata:
      labels:
        app: library-frontend
    spec:
      nodeSelector:
        kubernetes.azure.com/agentpool: apppool

      containers:
        - name: frontend
          image: your-registry/library-frontend:latest
          imagePullPolicy: IfNotPresent
          
          ports:
            - containerPort: 80
          
          env:
            - name: VITE_API_URL
              value: "http://library-backend:8000"
          
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"

---
apiVersion: v1
kind: Service
metadata:
  name: library-frontend
  namespace: app
spec:
  type: LoadBalancer
  selector:
    app: library-frontend
  ports:
    - name: http
      port: 80
      targetPort: 80
